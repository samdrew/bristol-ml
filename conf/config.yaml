defaults:
  - _self_
  - ingestion/neso@ingestion.neso
  - ingestion/weather@ingestion.weather
  - ingestion/neso_forecast@ingestion.neso_forecast
  - features/weather_only@features.weather_only
  - evaluation/rolling_origin@evaluation.rolling_origin
  - evaluation/metrics@evaluation.metrics
  - evaluation/benchmark@evaluation.benchmark
  - model: linear

project:
  name: bristol_ml
  seed: 20260418

hydra:
  run:
    dir: data/_runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: data/_runs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
