# @package ingestion.weather
#
# Open-Meteo historical weather archive — per-station point queries for ten
# UK population centres. Drives Stage 2's ``features.weather.national_aggregate``
# (population-weighted national signal).
#
# The archive endpoint serves ERA5 / ERA5-Land / CERRA reanalyses — NOT the
# UKMO UKV 2 km model (flagged as a DESIGN §4.2 drift; the UKV archive only
# begins 2022-03-01 and is served via historical-forecast-api, not archive-api).
# Coordinates are city-hall references to three decimals; ±0.05° jitter is
# analytically irrelevant inside the ~11 km ERA5-Land cell.
#
# Weights are 2011 Census Built-Up Area populations — the most recent
# UK-wide comparable series (Scotland 2022 + NI 2021 + E&W 2021 are not yet
# published as a harmonised urban-area table as of 2026).
# Source: https://en.wikipedia.org/wiki/List_of_urban_areas_in_the_United_Kingdom
# (ONS 2011 Census figures for BUAs).

base_url: https://archive-api.open-meteo.com/v1/archive
# Defaults to ``data/raw/weather`` relative to the current working directory;
# override with ``BRISTOL_ML_CACHE_DIR`` for portable caches.
cache_dir: ${oc.env:BRISTOL_ML_CACHE_DIR,data/raw/weather}
cache_filename: weather.parquet
# Stage 2 training window: start of NESO data (Stage 1) to current best-quality.
start_date: 2018-01-01
# end_date omitted → Open-Meteo serves up to its ~5-day-delayed present.
# Archive endpoint defaults to ``timezone=GMT`` = UTC; we request UTC explicitly.
timezone: UTC
variables:
  - temperature_2m
  - dew_point_2m
  - wind_speed_10m
  - cloud_cover
  - shortwave_radiation
request_timeout_seconds: 30.0
# The published rate limits (10 000/day, 5 000/hour, 600/minute) are
# call-count limits, but Open-Meteo's free archive applies an
# undocumented per-IP burst ceiling on top — a multi-year per-station
# fetch is large (~365k data points per response) and 6-7 such calls
# in tight succession exhaust the minutely token bucket.  The 5 s
# inter-request gap below paces a 10-station refresh to ~50 s, well
# under any per-minute envelope; the 5-attempt budget plus 60 s
# backoff cap absorbs a typical "try again in one minute" cooldown
# that Open-Meteo advertises in the JSON error body when the
# minutely bucket trips.  See ``ingestion/_common.py`` for the
# Retry-After + JSON-reason parsing that lets the retry loop honour
# the server's advertised cooldown.
max_attempts: 5
backoff_base_seconds: 1.0
backoff_cap_seconds: 60.0
min_inter_request_seconds: 5.0
stations:
  - name: london
    latitude: 51.5074
    longitude: -0.1278
    weight: 9787426
    weight_source: "ONS 2011 Census, Greater London BUA"
  - name: birmingham
    latitude: 52.4862
    longitude: -1.8904
    weight: 2440986
    weight_source: "ONS 2011 Census, West Midlands BUA"
  - name: manchester
