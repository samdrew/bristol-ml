# @package embedding
#
# Default configuration for the Stage 15 embedding index.
#
# The default ``type`` is ``stub`` — every CI run, every notebook
# bootstrap, and every test that does not explicitly opt in resolves
# this configuration. AC-4 (intent line 33): "the embedding model has
# no external API dependency — it runs locally" is enforced both here
# (default discriminator) and by the env-var triple-gate at
# ``build_embedder`` (plan §1 D8 — YAML default + ``BRISTOL_ML_EMBEDDING_STUB=1``
# env-var + model-availability check at init).
#
# To switch to the live sentence-transformers path:
#
#   uv run python -m bristol_ml.embeddings embedding.type=sentence_transformers
#
# Plan §1 D4 / A2 (Ctrl+G 2026-04-27): the live default checkpoint is
# ``Alibaba-NLP/gte-modernbert-base`` (149 M params, 768-dim, MTEB-56
# avg 64.38, Apache 2.0, no ``trust_remote_code``, max_seq=8192,
# requires ``transformers >= 4.48.0``). Half-precision inference via
# ``model_kwargs={"torch_dtype": torch.float16}`` halves the RAM
# footprint to ~149 MB.
#
# This group is *not* in ``conf/config.yaml``'s defaults list — entry
# points compose it explicitly via ``+embedding=default`` (mirroring
# the Stage 14 ``llm`` and Stage 12 ``serving`` precedents).
#
# Round-trip is asserted by
# ``tests/unit/test_config.py::test_embedding_config_round_trips_through_hydra``.

type: stub
model_id: Alibaba-NLP/gte-modernbert-base
cache_path: null  # null = derive from model_id at embed_corpus call time
vector_backend: numpy
default_top_k: 10
projection_type: umap
force_rebuild: false
fp16: true
