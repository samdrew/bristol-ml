# @package serving
#
# Default configuration for the Stage 12 serving layer (FastAPI + uvicorn).
# Hydra composes this group only when the serving CLI explicitly asks
# for it via ``+serving=default`` (or the eventual standalone CLI's
# implicit composition); the train pipeline's ``conf/config.yaml``
# does *not* include ``serving`` in its defaults list, so
# ``cfg.serving`` resolves to ``None`` for the train surface (plan
# §5 / D2 / D13).
#
# The defaults below mirror ``ServingConfig``'s Python-side defaults
# verbatim; the round-trip is asserted by
# ``tests/unit/test_config.py::test_serving_config_round_trips_through_hydra``.
#
# Localhost-only by design: deployment beyond localhost is intent
# §Out of scope for Stage 12.

registry_dir: data/registry
host: 127.0.0.1
port: 8000
