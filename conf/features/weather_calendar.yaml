# @package features
#
# Weather + calendar feature set (Stage 5).
#
# Composes the Stage 3 weather-only pipeline with Stage 5's pure calendar
# derivation (``bristol_ml.features.calendar.derive_calendar``) plus the
# bank-holidays ingester (``bristol_ml.ingestion.holidays``).  The calendar
# layer appends 44 columns (23 one-hot hour-of-day + 6 one-hot day-of-week +
# 11 one-hot month + 2 per-division bank-holiday flags + 2 holiday-proximity
# flags) to each row of the weather-only output.  Per plan D-2 the per-division
# flags are ``is_bank_holiday_ew`` and ``is_bank_holiday_sco`` (NI is cached
# but not encoded); per plan D-5 the proximity flags fire on the intersection
# of the E&W and Scotland holiday-date sets.  Per plan D-4 Monday is the
# day-of-week reference category (dropped from the one-hot).
#
# This file is a member of the ``features`` Hydra group.  Select it with
# ``features=weather_calendar`` at the CLI; the default (no override) loads
# ``conf/features/weather_only.yaml`` instead.  Exactly one of the two is
# populated per run; ``bristol_ml.train._resolve_feature_set`` raises on the
# degenerate cases.

weather_calendar:
  name: weather_calendar
  # Inherits Stage 3 D1: ``mean`` of the two half-hourly NESO rows per UTC hour.
  demand_aggregation: mean
  # Derived artefact alongside ``weather_only.parquet`` — same directory, same
  # raw-vs-derived convention.
  cache_dir: ${oc.env:BRISTOL_ML_CACHE_DIR,data/features}
  cache_filename: weather_calendar.parquet
  # Inherits Stage 3 D5: forward-fill short weather gaps up to three hours.
  forward_fill_hours: 3
