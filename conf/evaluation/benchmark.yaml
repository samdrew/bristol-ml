# @package evaluation.benchmark
#
# Three-way benchmark comparison against the NESO day-ahead forecast (Stage 4).
# Consumes ``cfg.ingestion.neso_forecast`` to load the cached half-hourly
# forecast + outturn archive; aggregates to hourly per ``aggregation``; metrics
# are computed over the ``[holdout_start, holdout_end)`` window.
#
# Default window is 2023 Q4 — a representative period that sits well inside
# the April-2021+ forecast-archive coverage and lines up with the shipped
# weather warm-cache year.  Override at the CLI for other windows:
#   evaluation.benchmark.holdout_start='2023-07-01T00:00:00+00:00'

# D4 (plan §1): ``mean`` preserves the MW rate across the two half-hours per
# UTC hour; matches Stage 3 D1.  Alternative ``first`` keeps only the first
# settlement period per hour (loses information; retained for ablation).
aggregation: mean
# Tz-aware UTC timestamps — the ``NesoBenchmarkConfig`` validator rejects naive
# datetimes.  Formatting: ISO 8601 with an explicit UTC offset.
holdout_start: "2023-10-01T00:00:00+00:00"
holdout_end: "2024-01-01T00:00:00+00:00"
