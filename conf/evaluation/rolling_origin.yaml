# @package evaluation.rolling_origin
#
# Rolling-origin cross-validation splitter (Stage 3). Yields integer-index
# ``(train_idx, test_idx)`` pairs consumed by every subsequent modelling stage.
#
# Defaults assume the Stage 3 hourly feature table. For the 2018-2025 range
# (~8 years × 8760 hours ≈ 70 080 rows) a 1-year minimum training window and a
# 24-hour test window stepping by 24 hours yields ~365 folds across the last
# 12 months when paired with ``df.iloc[-(365*24+min_train_periods):]`` or
# equivalent downstream slicing.

# D4 (plan §1): one full seasonal cycle (24 × 365) before the first test
# origin. Downstream code may choose a larger training floor.
min_train_periods: 8760
# 24 hours = 1 day test window — the canonical day-ahead horizon (DESIGN §5.1).
test_len: 24
# 24-hour step == 365 non-overlapping daily folds across a year.
step: 24
# D4: gate-closure gap is zero for historical training; override at Stage 4
# when serving-side semantics become concrete.
gap: 0
# D4: expanding window by default (training grows with each fold). Flip to
# ``true`` for a fixed-size sliding window of ``min_train_periods`` rows.
fixed_window: false
