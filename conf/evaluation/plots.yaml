# @package evaluation.plots
#
# Diagnostic-plot defaults consumed by ``bristol_ml.evaluation.plots`` (Stage 6).
# Every value here is also the Python-side default on ``PlotsConfig`` so
# programmatic construction without Hydra yields the same rendering.
#
# Override examples:
#   evaluation.plots.figsize=[16,10]           # wider projector
#   evaluation.plots.display_tz=UTC            # disable DST-aware rendering
#   evaluation.plots.acf_default_lags=336      # two-week ACF view

# D5 (human mandate 2026-04-20): 12×8 is the projector-friendly default —
# wider than matplotlib's 6.4×4.8 baseline for meetup legibility (AC-2);
# taller than 10×6 so a 2×2 notebook grid does not squash vertically.
figsize: [12.0, 8.0]
# Middle ground between 100 dpi (blurry on HiDPI) and 150 dpi (PNG bloat).
dpi: 110
# D6: Europe/London local time makes the hour-of-day heatmap pedagogically
# readable ("demand at 18:00" is a local concept). T3 includes DST gates that
# swap this default to "UTC" if pandas+matplotlib mis-render the transitions.
display_tz: Europe/London
# D7: 168 hourly lags = one full week; covers daily (lag 24) + weekly (lag 168)
# reference markers annotated on the ACF plot.
acf_default_lags: 168
