# @package evaluation.metrics
#
# Named point-forecast metrics the Stage 4 evaluator harness computes per
# fold.  Names refer to pure functions in ``bristol_ml.evaluation.metrics``;
# DESIGN §5.3 enumerates these four.
#
# Per plan D8 (MAPE zero-denominator) and D9 (WAPE = Σ|y−ŷ|/Σ|y|) both
# metrics are mathematically well-defined for GB national demand (which never
# approaches zero).  Override to a shorter list for notebook fluency:
#   evaluation.metrics.names=[mae,rmse]

names:
  - mae
  - mape
  - rmse
  - wape
