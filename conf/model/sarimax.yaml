# @package model
#
# SARIMAX (seasonal ARIMA with exogenous regressors) model (Stage 7).  Select
# at the CLI with
#   python -m bristol_ml.train model=sarimax
#
# For the SARIMAX notebook demo (and any production rolling-origin run), combine
# with the fixed-sliding-window splitter override per plan §1 D4:
#   python -m bristol_ml.train model=sarimax \
#     evaluation.rolling_origin.fixed_window=true \
#     evaluation.rolling_origin.step=168
#
# Plan §1 D1: the dual seasonality of GB hourly demand (24 h daily + 168 h
# weekly) is encoded via dynamic harmonic regression — SARIMAX carries the
# daily seasonal order (s=24) and the weekly period is absorbed by
# ``weekly_fourier_harmonics`` sin/cos exogenous pairs at ``period=168``.
# Setting ``weekly_fourier_harmonics: 0`` disables the weekly Fourier path.
#
# Plan §1 D2: ``order=(1,0,1), seasonal_order=(1,1,1,24)`` is the conservative
# textbook pick from Hyndman fpp3 §9 for hourly electricity.  The Stage 7
# notebook exhibits a small AIC grid sweep that justifies it pedagogically;
# auto-order search as an architectural feature is out of scope (intent §Out
# of scope).
#
# ``feature_columns: null`` means "every non-target column on the supplied
# feature frame" — typically the Stage 5 weather + calendar columns plus the
# weekly-Fourier pairs appended by ``SarimaxModel.fit()``.

type: sarimax
target_column: nd_mw
feature_columns: null
order: [1, 0, 1]
seasonal_order: [1, 1, 1, 24]
trend: null
weekly_fourier_harmonics: 3
# Plan §1 D6: statsmodels SARIMAX constructor kwargs.  Defaults match the
# Pydantic ``SarimaxKwargs`` schema in ``conf/_schemas.py``.
sarimax_kwargs:
  enforce_stationarity: false
  enforce_invertibility: false
  concentrate_scale: true
  simple_differencing: false
  hamilton_representation: false
