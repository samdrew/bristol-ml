# @package model
#
# Seasonal-naive baseline model (Stage 4).  One of two alternatives under the
# ``model`` Hydra group; select at the CLI with
#   python -m bristol_ml.train model=naive
#
# Per plan D1 the default ``strategy`` is ``same_hour_last_week`` (lag = 168
# hours): the look-up captures the dominant weekly seasonality of GB demand
# without training a loop, so it is a credible-but-beatable floor against which
# the linear OLS must fight.  Alternatives ``same_hour_yesterday`` (easier to
# beat) and ``same_hour_same_weekday`` (marginally harder) are available as
# overrides: ``model.strategy=same_hour_yesterday``.

type: naive
strategy: same_hour_last_week
target_column: nd_mw
