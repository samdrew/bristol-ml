# @package model
#
# Small-MLP neural network model (Stage 10).  Select at the CLI with
#   python -m bristol_ml.train model=nn_mlp
#
# Plan §1 D3: default is a 1-hidden-layer × 128-unit ReLU MLP, trained with
# Adam(lr=1e-3, weight_decay=0), batch_size=32, max_epochs=100, patience=10.
# Intent §Points ("one or two hidden layers, moderate width") bounds the
# pedagogical envelope; switch to ``hidden_sizes: [128, 64]`` for a
# two-layer experiment without code changes.
#
# Plan §1 D11: ``device: auto`` resolves CUDA > MPS > CPU at fit time.  Pin
# to ``cpu`` for bit-identical reproducibility tests (NFR-1 CPU path); pin
# to ``cuda`` to force GPU use when both CUDA and MPS are detected.
#
# Plan §1 D7': reproducibility is per-fold (cold-start, D8) and seeded via
# ``config.project.seed + fold_index`` unless ``seed`` below is explicitly set.
# On the CUDA path ``cudnn.deterministic`` / ``cudnn.benchmark=False`` are set
# inside fit(); the GPU-nondeterminism carve-out in intent AC-2 means
# bit-identity holds on CPU only.
#
# Plan §1 D9: patience-based early stopping with best-epoch weight restore.
# The internal validation slice is a 10 % tail of the train fold (not leaked
# from the harness's test fold) — see ``docs/architecture/layers/models-nn.md``.

type: nn_mlp
target_column: nd_mw
feature_columns: null
hidden_sizes: [128]
activation: relu
dropout: 0.0
learning_rate: 1.0e-3
weight_decay: 0.0
batch_size: 32
max_epochs: 100
patience: 10
seed: null
device: auto
