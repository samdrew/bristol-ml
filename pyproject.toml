[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bristol_ml"
version = "0.0.0"
description = "Reference ML/DS architecture with a GB day-ahead electricity demand forecaster as the worked example."
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { text = "MIT" }
authors = [{ name = "Sam Drew", email = "comm@sdrew.com" }]
dependencies = [
    "hydra-core>=1.3,<2",
    "omegaconf>=2.3,<3",
    "pydantic>=2.7,<3",
    "httpx>=0.27,<1",
    "tenacity>=9,<10",
    "pyarrow>=16,<22",
    "pandas>=2.2,<3",
    "loguru>=0.7,<1",
    "statsmodels>=0.14,<1",
    # Stage 8 (D12): explicit scipy declaration.  scipy is transitively pulled
    # in by statsmodels at present, but relying on that is fragile — a fresh
    # venv resolving statsmodels from a wheel-only mirror could arrive
    # without scipy's exposed C extensions.  1.13 is the first scipy release
    # with formal NumPy 2.0 support; ``<2`` guards a hypothetical ABI break.
    "scipy>=1.13,<2",
    "joblib>=1.4,<2",
    # Stage 6 (D3): matplotlib promoted from dev to runtime so
    # ``python -m bristol_ml.evaluation.plots --help`` works on non-dev installs
    # per AC-10 / DESIGN §2.1.1. ``seaborn`` added alongside for the Stage 6
    # heatmap helper and the ``colorblind`` palette utilities (D1).
    "matplotlib>=3.8,<4",
    "seaborn>=0.13,<1",
]

[dependency-groups]
dev = [
    "pytest>=8,<9",
    "ruff>=0.6,<1",
    "pre-commit>=3.7,<5",
    "pytest-recording>=0.13,<1",
    "vcrpy>=6,<8",
    "jupyter>=1,<2",
    "nbconvert>=7,<8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/bristol_ml"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["bristol_ml", "conf"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
# ``-m "not slow"`` excludes the ``@pytest.mark.slow`` benchmark guards from the
# default suite (see Stage 7 T4 plan clause — ``test_sarimax_fit_single_fold_``
# ``completes_under_60_seconds``).  Run them explicitly with ``uv run pytest -m slow``.
addopts = "-ra --strict-markers --record-mode=none -m 'not slow'"
markers = [
    "slow: benchmark/performance guards excluded from the default run; opt in with -m slow.",
]
filterwarnings = [
    "ignore::DeprecationWarning:vcr.*",
]
