[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bristol_ml"
version = "0.0.0"
description = "Reference ML/DS architecture with a GB day-ahead electricity demand forecaster as the worked example."
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { text = "MIT" }
authors = [{ name = "Sam Drew", email = "comm@sdrew.com" }]
dependencies = [
    "hydra-core>=1.3,<2",
    "omegaconf>=2.3,<3",
    "pydantic>=2.7,<3",
]

[dependency-groups]
dev = [
    "pytest>=8,<9",
    "ruff>=0.6,<1",
    "pre-commit>=3.7,<5",
]

[tool.hatch.build.targets.wheel]
packages = ["src/bristol_ml"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["bristol_ml", "conf"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
addopts = "-ra --strict-markers"
